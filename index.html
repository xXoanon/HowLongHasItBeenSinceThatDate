<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>How long has it been since that date?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c2c2c">
</head>

<body>
    <main class="container">
        <header>
            <h1>How long has it been since that date?</h1>
        </header>

        <form id="add-tracker-form">
            <div class="form-group">
                <label for="label">What are we tracking?</label>
                <input type="text" id="label" placeholder="e.g. Started my new job, My age, etc." required>
            </div>
            <div class="form-group">
                <label for="start-date">Since when?</label>
                <input type="date" id="start-date" required>
            </div>
            <button type="submit">Add Tracker</button>
        </form>

        <div class="controls">
            <div class="form-group sort-group">
                <label for="sort-trackers">Sort By</label>
                <select id="sort-trackers">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="alphabetical">Alphabetical (A-Z)</option>
                </select>
            </div>
        </div>

        <div id="trackers">
        </div>
    </main>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>

</html>
