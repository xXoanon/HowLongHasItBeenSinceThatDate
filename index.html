<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How long has it been since that date?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c2c2c">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
</head>

<body>
    <main class="container">
        <header class="top-bar">
            <h1>How Long Has It Been?</h1>
            <div class="top-bar-controls">
                <button id="theme-btn" class="icon-btn" aria-label="Toggle theme" title="Toggle Theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
                    </svg>
                </button>
                <select id="sort-trackers" class="minimal-select" aria-label="Sort trackers">
                    <option value="newest">Sort: Newest</option>
                    <option value="oldest">Sort: Oldest</option>
                    <option value="alphabetical">Sort: A-Z</option>
                </select>
                <button id="new-btn" class="btn-primary">New</button>
            </div>
        </header>

        <dialog id="add-modal">
            <form id="add-tracker-form">
                <div class="form-group">
                    <label for="label">What are we tracking?</label>
                    <input type="text" id="label" placeholder="e.g. Started my new job, My age, etc." required>
                </div>
                <div class="form-group">
                    <label for="start-date">Since when?</label>
                    <input type="date" id="start-date" required>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="action-btn">Cancel</button>
                    <button type="submit" class="btn-primary">Add Tracker</button>
                </div>
            </form>
        </dialog>

        <div id="trackers">
        </div>
    </main>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>

</html>
